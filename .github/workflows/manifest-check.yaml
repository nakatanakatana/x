render_all("/tmp/manifests/base-rendered.yaml")
'

      - name: Calculate Manifest Diff
        id: diff
        run: |
          echo "DIFF_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          git diff --no-index /tmp/manifests/base-rendered.yaml /tmp/manifests/pr-rendered.yaml >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment Diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.DIFF_OUTPUT }}`;
            const body = diff.trim() ? 
              `### 🚀 Kubernetes Manifest Diff (Expanded Helm & Flux)\n\`\`\`diff\n${diff}\n\`\`\`` :
              `### 🚀 Kubernetes Manifest Diff (Expanded Helm & Flux)\nNo manifest changes detected after render.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('🚀 Kubernetes Manifest Diff'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
