name: Kubernetes Manifest Validation & Diff

on:
  pull_request:
    branches:
      - main
    paths:
      - 'clusters/**'
      - 'components/**'
      - '.github/workflows/**'

jobs:
  validate-and-diff:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install Kubeconform
        run: |
          KUBECONFORM_VERSION="v0.6.7"
          curl -sLO "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
          rm kubeconform-linux-amd64.tar.gz

      - name: Render PR Manifests & Run Kubeconform Lint
        id: render-pr
        run: |
          mkdir -p /tmp/manifests
          
          # Render Kustomize/Helm manifests with YAML document separators
          find clusters components -name "kustomization.yaml" -execdir sh -c 'kustomize build --enable-helm . && echo "---"' \; > /tmp/manifests/pr-rendered.yaml
          
          # Run schema validation using Kubeconform
          echo "=== Running Kubeconform Schema Validation ==="
          cat /tmp/manifests/pr-rendered.yaml | kubeconform -strict -ignore-missing-schemas -summary

      - name: Checkout Base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}

      - name: Render Base Manifests
        id: render-base
        run: |
          mkdir -p /tmp/manifests
          find clusters components -name "kustomization.yaml" -execdir sh -c 'kustomize build --enable-helm . && echo "---"' \; > /tmp/manifests/base-rendered.yaml || true

      - name: Calculate Manifest Diff
        id: diff
        run: |
          echo "DIFF_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          git diff --no-index /tmp/manifests/base-rendered.yaml /tmp/manifests/pr-rendered.yaml || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment Diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.DIFF_OUTPUT }}`;
            const body = diff.trim() ? 
              `### 🚀 Kubernetes Manifest Diff\n\`\`\`diff\n${diff}\n\`\`\`` :
              `### 🚀 Kubernetes Manifest Diff\nNo manifest changes detected after render.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('🚀 Kubernetes Manifest Diff'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
