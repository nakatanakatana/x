apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: HelmRepository
metadata:
  name: kiali
  namespace: kiali
spec:
  interval: 30m
  url: https://kiali.org/helm-charts

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kiali-operator
  namespace: kiali
spec:
  interval: 5m
  chart:
    spec:
      chart: kiali-operator
      version: ">=1.48.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: kiali
      interval: 1m
