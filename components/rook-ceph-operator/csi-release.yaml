apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ceph-csi-drivers
  namespace: rook-ceph
spec:
  interval: 10m
  timeout: 5m
  dependsOn:
    - name: rook-ceph
  chart:
    spec:
      interval: 10m
      chart: ceph-csi-drivers
      version: "1.0.4"
      sourceRef:
        kind: HelmRepository
        name: ceph-csi-operator
  releaseName: ceph-csi-drivers
  install:
    disableTakeOwnership: false
  upgrade:
    disableTakeOwnership: false
  values:
    operatorConfig:
      create: false
    drivers:
      rbd:
        enabled: true
        name: rook-ceph.rbd.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        nodePlugin:
          priorityClassName: system-node-critical
        controllerPlugin:
          priorityClassName: system-cluster-critical
          replicas: 2
      cephfs:
        enabled: true
        name: rook-ceph.cephfs.csi.ceph.com
        imageSet:
          name: rook-csi-operator-image-set-configmap
        clusterName: rook-ceph
        nodePlugin:
          priorityClassName: system-node-critical
        controllerPlugin:
          priorityClassName: system-cluster-critical
          replicas: 2
      nfs:
        enabled: false
      nvmeof:
        enabled: false
