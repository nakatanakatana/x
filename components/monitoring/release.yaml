apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-operator-crds
  namespace: monitoring
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: prometheus-operator-crds
    namespace: monitoring
  releaseName: prometheus-operator-crds
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-k8s-monitoring
  namespace: monitoring
spec:
  interval: 10m
  timeout: 5m
  chart:
    spec:
      interval: 10m
      chart: k8s-monitoring
      version: '4.0.4'
      sourceRef:
        kind: HelmRepository
        name: grafana
  releaseName: grafana-k8s-monitoring
  dependsOn:
    - name: prometheus-operator-crds
  valuesFrom:
    - kind: ConfigMap
      name: k8s-monitoring

