apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
resources:
  - https://github.com/tektoncd/pipeline/releases/download/v1.14.0/release.yaml
  - https://github.com/tektoncd/pipelines-as-code/releases/download/v0.48.0/release.k8s.yaml
  - https://github.com/tektoncd/dashboard/releases/download/v0.69.0/release.yaml

# We DO NOT set a global namespace here, as it would force all resources 
# (including those for resolvers) into a single namespace, causing ID conflicts.
# Instead, we rely on the manifests' original namespaces and use patches to 
# manage the Namespace resources themselves and redirect PaC/Dashboard.

patches:
  - target:
      kind: Namespace
      name: tekton-pipelines
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: tekton-pipelines
      $patch: delete
  - target:
      kind: Namespace
      name: tekton-pipelines-resolvers
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: tekton-pipelines-resolvers
      $patch: delete
  - target:
      kind: Namespace
      name: pipelines-as-code
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: pipelines-as-code
      $patch: delete
  - target:
      kind: Namespace
      name: tekton-dashboard
    patch: |
      apiVersion: v1
      kind: Namespace
      metadata:
        name: tekton-dashboard
      $patch: delete

  # Ensure PaC and Dashboard are placed in tekton-pipelines namespace
  - target:
      namespace: pipelines-as-code
    patch: |
      - op: replace
        path: /metadata/namespace
        value: tekton-pipelines
  - target:
      namespace: tekton-dashboard
    patch: |
      - op: replace
        path: /metadata/namespace
        value: tekton-pipelines
