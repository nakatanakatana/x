apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vcluster-sandbox-sync
  namespace: sandbox
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  path: "clusters/vcluster-sandbox"
  prune: true
  timeout: 2m
  kubeConfig:
    secretRef:
      name: vc-vcluster
      key: config
  dependsOn:
    - name: vcluster-sandbox
      namespace: flux-system
