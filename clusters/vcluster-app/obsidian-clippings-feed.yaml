apiVersion: v1
kind: Namespace
metadata:
  name: obsidian-clippings-feed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
  labels:
    app: obsidian-clippings-feed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-clippings-feed
  template:
    metadata:
      labels:
        app: obsidian-clippings-feed
    spec:
      containers:
        - name: obsidian-clippings-feed
          image: ghcr.io/nakatanakatana/obsidian-clippings-feed:latest@sha256:bc9b5bdf43f1f0a13ac913dc908b67fc46896d3ec0027c6dc9b60279d27aeb70
          imagePullPolicy: Always
          env:
            - name: FEED_TARGET_DIR
              value: /app/data
          volumeMounts:
            - name: data
              mountPath: /app/data
          ports:
            - containerPort: 8080
      initContainers:
        - name: livesync-bridge
          image: ghcr.io/nakatanakatana/livesync-bridge:latest@sha256:e584aecbea495a14f912c1d1f6188ae410a85c10eb8ab68085c6410acd1bd674
          imagePullPolicy: Always
          restartPolicy: Always
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: livesync-config
              mountPath: /app/dat
      volumes:
        - name: data
          emptyDir: {}
        - name: livesync-config
          secret:
            secretName: obsidian-secret
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
spec:
  type: ClusterIP
  selector:
    app: obsidian-clippings-feed
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
spec:
  ingressClassName: cloudflare-tunnel
  rules:
  - host: clippings.nakatanakatana.app
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: obsidian-clippings-feed
            port:
              number: 8080
