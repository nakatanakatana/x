apiVersion: v1
kind: Namespace
metadata:
  name: obsidian-clippings-feed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
  labels:
    app: obsidian-clippings-feed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obsidian-clippings-feed
  template:
    metadata:
      labels:
        app: obsidian-clippings-feed
    spec:
      containers:
        - name: obsidian-clippings-feed
          image: ghcr.io/nakatanakatana/obsidian-clippings-feed:latest@sha256:d2f22cb273291c0b2d4e2b4434b94e0772084a0ef43e27dff45005f51fa48b8e
          imagePullPolicy: Always
          env:
            - name: FEED_TARGET_DIR
              value: /app/data
          volumeMounts:
            - name: data
              mountPath: /app/data
          ports:
            - containerPort: 8080
      initContainers:
        - name: livesync-bridge
          image: ghcr.io/nakatanakatana/livesync-bridge:latest@sha256:abad8ec89e98b8a543659e13f0f4cf60ebbc14df6c6519789e9cd14944429b09
          imagePullPolicy: Always
          restartPolicy: Always
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: livesync-config
              mountPath: /app/dat
      volumes:
        - name: data
          emptyDir: {}
        - name: livesync-config
          secret:
            secretName: obsidian-secret
---
apiVersion: v1
kind: Service
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
spec:
  type: ClusterIP
  selector:
    app: obsidian-clippings-feed
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obsidian-clippings-feed
  namespace: obsidian-clippings-feed
spec:
  ingressClassName: cloudflare-tunnel
  rules:
  - host: clippings.nakatanakatana.app
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: obsidian-clippings-feed
            port:
              number: 8080
