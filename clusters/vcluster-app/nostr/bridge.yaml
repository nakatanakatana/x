apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nostr-bridge-data
  namespace: nostr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: rook-ceph-block
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nostr-bridge
  namespace: nostr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nostr-bridge
  template:
    metadata:
      labels:
        app: nostr-bridge
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-litestream
          image: litestream/litestream:0.5.15@sha256:f45ca298a567bef6edd23d43429b5f80721473a9a9719e467f11d7888999403e
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - restore
            - -if-db-not-exists
            - -if-replica-exists
            - /var/lib/nostr-bridge/bridge.db
          env:
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nostr-storage
                  key: access-key-id
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-storage
                  key: secret-access-key
          volumeMounts:
            - name: data
              mountPath: /var/lib/nostr-bridge
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
      containers:
        - name: nostr-bridge
          image: ghcr.io/nakatanakatana/nostr-bridge:0.6.4@sha256:2d40be61c455cb6731a78dcf621d59d5c7b2b1f1366c5a43f7a3f17b6e482982
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          env:
            - name: NOSTR_BRIDGE_HOST
              value: 0.0.0.0
            - name: NOSTR_BRIDGE_PORT
              value: "8080"
            - name: NOSTR_BRIDGE_DATABASE_PATH
              value: /var/lib/nostr-bridge/bridge.db
            - name: NOSTR_BRIDGE_RELAY_MANAGEMENT_URL
              value: http://nostr-relay-management:8081
            - name: NOSTR_BRIDGE_OWNER_ID
              value: nakatanakatana-bridge
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_AUTHORIZATION_SERVER_URL
              value: https://bsky.social
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_CLIENT_ID
              value: https://nostr-bridge.nakatanakatana.app/oauth/bluesky/client-metadata.json
            - name: NOSTR_BRIDGE_BLUESKY_ACCOUNT_DID
              value: did:plc:ndlnnkil3dfa7m7z4tkk2pes
            - name: NOSTR_BRIDGE_BLUESKY_BASE_URL
              value: https://verpa.us-west.host.bsky.network
            - name: NOSTR_BRIDGE_BLUESKY_JETSTREAM_URL
              value: wss://jetstream2.us-east.bsky.network/subscribe
            - name: NOSTR_BRIDGE_BLUESKY_LIST_URIS
              value: at://did:plc:ndlnnkil3dfa7m7z4tkk2pes/app.bsky.graph.list/3kkzs3w53n524
            - name: NOSTR_BRIDGE_RELAY_URL
              value: ws://nostr-relay-protocol:8080
            - name: NOSTR_BRIDGE_RELAY_CANONICAL_URL
              valueFrom:
                secretKeyRef:
                  name: nostr-config
                  key: relay-service-url
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: nostr-config
                  key: bridge-callback-url
            - name: NOSTR_BRIDGE_RELAY_ADMIN_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: relay-admin-private-key
            - name: NOSTR_BRIDGE_MASTER_SEED
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: master-seed
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_CLIENT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: oauth-client-signing-key
            - name: NOSTR_BRIDGE_BLUESKY_OAUTH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: oauth-encryption-key
            - name: NOSTR_BRIDGE_MASTODON_BASE_URL
              value: https://mstdn.jp
            - name: NOSTR_BRIDGE_MASTODON_ACCOUNT
              value: nakatanakatana@mstdn.jp
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_CALLBACK_URL
              valueFrom:
                secretKeyRef:
                  name: nostr-config
                  key: mastodon-callback-url
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_CLIENT_ID
              value: 8arEwiI-CnRtHSukPgRc1yPz9EnZ54Qde4ibc2WTH6Q
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: mastodon-oauth-client-secret
            - name: NOSTR_BRIDGE_MASTODON_OAUTH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-credentials
                  key: mastodon-oauth-encryption-key
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/nostr-bridge
            - name: tmp
              mountPath: /tmp
        - name: litestream
          image: litestream/litestream:0.5.15@sha256:f45ca298a567bef6edd23d43429b5f80721473a9a9719e467f11d7888999403e
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          args:
            - replicate
          env:
            - name: LITESTREAM_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: nostr-storage
                  key: access-key-id
            - name: LITESTREAM_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: nostr-storage
                  key: secret-access-key
          volumeMounts:
            - name: data
              mountPath: /var/lib/nostr-bridge
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nostr-bridge-data
        - name: tmp
          emptyDir: {}
        - name: litestream-config
          configMap:
            name: nostr-bridge-litestream
---
apiVersion: v1
kind: Service
metadata:
  name: nostr-bridge
  namespace: nostr
spec:
  publishNotReadyAddresses: true
  selector:
    app: nostr-bridge
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nostr-bridge
  namespace: nostr
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - nostr-bridge
  rules:
    - host: nostr-bridge
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nostr-bridge
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nostr-bridge-cloudflare
  namespace: nostr
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: nostr-bridge.nakatanakatana.app
      http:
        paths:
          - path: /oauth/mastodon/callback
            pathType: Prefix
            backend:
              service:
                name: nostr-bridge
                port:
                  number: 8080
          - path: /oauth/bluesky/callback
            pathType: Prefix
            backend:
              service:
                name: nostr-bridge
                port:
                  number: 8080
          - path: /oauth/bluesky/client-metadata.json
            pathType: Prefix
            backend:
              service:
                name: nostr-bridge
                port:
                  number: 8080
          - path: /oauth/bluesky/jwks
            pathType: Prefix
            backend:
              service:
                name: nostr-bridge
                port:
                  number: 8080
